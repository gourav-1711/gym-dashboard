kind = "web"
previewPath = "/"
title = "Gym Membership Dashboard"
version = "1.0.0"
id = "artifacts/gym-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25492
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gym-dashboard run dev"

[services.env]
PORT = "25492"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gym-dashboard", "run", "build"]
publicDir = "artifacts/gym-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
